# Deploy Mr. Beefy Backend
# Environment-aware: main branch -> prod, dev branch -> dev.
# Manual dispatch allows choosing the target environment explicitly.

name: Deploy Mr. Beefy Backend

on:
  push:
    branches: [ main, dev ]
    paths:
      - "backend/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "prod"
        type: choice
        options:
          - prod
          - dev
      reason:
        description: "Why are you manually deploying?"
        required: false
        default: "Manual trigger"

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      # Derive environment: manual input takes priority, then branch name, default to prod.
      DEPLOY_ENV: ${{ inputs.environment || (github.ref_name == 'dev' && 'dev') || 'prod' }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # -----------------------------
    # Resolve Environment
    # prod uses the "default" Terraform workspace (local.prefix = "mrbeefy").
    # dev uses the "dev" workspace (local.prefix = "mrbeefy-dev").
    # -----------------------------
    - name: Resolve Environment
      id: env
      run: |
        if [ "$DEPLOY_ENV" = "dev" ]; then
          echo "tf_workspace=dev"           >> $GITHUB_OUTPUT
          echo "ssm_prefix=/mrbeefy-dev"    >> $GITHUB_OUTPUT
          echo "kb_name=mrbeefy-dev-kb"     >> $GITHUB_OUTPUT
          echo "alias_name=dev"             >> $GITHUB_OUTPUT
        else
          echo "tf_workspace=default"       >> $GITHUB_OUTPUT
          echo "ssm_prefix=/mrbeefy"        >> $GITHUB_OUTPUT
          echo "kb_name=mrbeefy-kb"         >> $GITHUB_OUTPUT
          echo "alias_name=prod"            >> $GITHUB_OUTPUT
        fi
        echo "Deploying to: $DEPLOY_ENV"

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    # -----------------------------
    # Build Lambda
    # -----------------------------
    - name: Install Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Lambda Dependencies
      working-directory: backend/lambda
      run: npm install

    - name: Fix esbuild permissions
      working-directory: backend/lambda
      run: chmod +x node_modules/.bin/esbuild

    - name: Build Lambda Bundle
      working-directory: backend/lambda
      run: npm run build

    - name: Zip Lambda Bundle
      working-directory: backend/lambda/dist
      run: zip -r ../dist.zip .

    # -----------------------------
    # Terraform Deploy
    # -----------------------------
    - name: Install Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      working-directory: backend/IaC
      run: terraform init -upgrade

    - name: Select Terraform Workspace
      working-directory: backend/IaC
      run: |
        if [ "${{ steps.env.outputs.tf_workspace }}" != "default" ]; then
          terraform workspace select "${{ steps.env.outputs.tf_workspace }}" \
            || terraform workspace new "${{ steps.env.outputs.tf_workspace }}"
        else
          terraform workspace select default
        fi

    - name: Terraform Apply
      working-directory: backend/IaC
      run: |
        terraform apply -auto-approve \
          -var="gateway_secret=$GATEWAY_SECRET"
      env:
        GATEWAY_SECRET: ${{ env.DEPLOY_ENV == 'dev' && secrets.DEV_GATEWAY_SECRET || secrets.GATEWAY_SECRET }}

    # -----------------------------
    # Capture Terraform Outputs
    # -----------------------------
    - name: Capture Terraform Outputs
      id: tfout
      working-directory: backend/IaC
      run: |
        echo "bucket=$(terraform output -raw knowledge_bucket)"                 >> $GITHUB_OUTPUT
        echo "bucket_arn=$(terraform output -raw knowledge_bucket_arn)"         >> $GITHUB_OUTPUT
        echo "kb_role_arn=$(terraform output -raw kb_role_arn)"                 >> $GITHUB_OUTPUT
        echo "agent_id=$(terraform output -raw agent_id)"                       >> $GITHUB_OUTPUT
        echo "function_url_domain=$(terraform output -raw function_url_domain)" >> $GITHUB_OUTPUT
        echo "function_name=$(terraform output -raw function_name)"             >> $GITHUB_OUTPUT

    # -----------------------------
    # Ensure AWS CLI v2
    # -----------------------------
    - name: Ensure awscli v2
      run: |
        set -e
        rm -rf aws awscliv2.zip
        curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
        unzip -o -q awscliv2.zip
        sudo ./aws/install --update
        echo "/usr/local/bin" >> $GITHUB_PATH
        aws --version

    # -----------------------------
    # Upload Knowledge Files
    # -----------------------------
    - name: Upload Knowledge Files
      run: |
        aws s3 sync knowledge/ s3://${{ steps.tfout.outputs.bucket }}/ --delete

    # -----------------------------
    # Create KB if not exists
    # Creates the S3 Vectors bucket, Knowledge Base, and data source on first deploy.
    # Idempotent — safe to run on every deploy.
    # -----------------------------
    - name: Create KB if not exists
      id: kb
      working-directory: backend/cli
      shell: pwsh
      run: |
        $KB_ID = ./create_kb.ps1 `
          -KbName    "${{ steps.env.outputs.kb_name }}" `
          -KbRoleArn "${{ steps.tfout.outputs.kb_role_arn }}" `
          -BucketArn "${{ steps.tfout.outputs.bucket_arn }}"

        # create_kb.ps1 outputs the KB ID as the last line
        $KB_ID = $KB_ID | Select-Object -Last 1
        echo "kb_id=$KB_ID" >> $env:GITHUB_OUTPUT

    # -----------------------------
    # Trigger KB Ingestion
    # -----------------------------
    - name: Trigger KB Ingestion
      working-directory: backend/cli
      shell: pwsh
      run: |
        ./ingest.ps1 -KbId "${{ steps.kb.outputs.kb_id }}"

    # -----------------------------
    # Associate KB with Agent (DRAFT)
    # -----------------------------
    - name: Associate KB with Agent (DRAFT)
      working-directory: backend/cli
      shell: pwsh
      run: |
        ./associate_kb.ps1 `
          -AgentId "${{ steps.tfout.outputs.agent_id }}" `
          -KbId    "${{ steps.kb.outputs.kb_id }}"

    # -----------------------------
    # Prepare Agent
    # Must run after KB association; required before creating a new version.
    # -----------------------------
    - name: Prepare Agent
      shell: bash
      env:
        AGENT_ID: ${{ steps.tfout.outputs.agent_id }}
      run: |
        set -euo pipefail
        aws bedrock-agent prepare-agent --agent-id "$AGENT_ID" > /dev/null
        for i in $(seq 1 24); do
          STATUS=$(aws bedrock-agent get-agent --agent-id "$AGENT_ID" \
            --query "agent.agentStatus" --output text)
          echo "Agent status: $STATUS"
          if [ "$STATUS" = "PREPARED" ]; then exit 0; fi
          sleep 5
        done
        echo "ERROR: Agent did not reach PREPARED in time" && exit 1

    # -----------------------------
    # Create or Recreate Alias
    # Omitting --routing-configuration causes Bedrock to automatically snapshot
    # the current prepared DRAFT as a new implicit version and route the alias
    # to it. This is the only supported way to version a Bedrock Agent via CLI.
    # We always delete and recreate so each deploy gets a fresh implicit version.
    # -----------------------------
    - name: Create or Recreate Alias
      id: create_or_update_alias
      shell: bash
      env:
        AGENT_ID: ${{ steps.tfout.outputs.agent_id }}
        ALIAS_NAME: ${{ steps.env.outputs.alias_name }}
        AWS_REGION: us-east-1
      run: |
        set -euo pipefail

        EXISTING_ALIAS_ID=$(aws bedrock-agent list-agent-aliases \
          --agent-id "$AGENT_ID" \
          --region "$AWS_REGION" \
          --query "agentAliasSummaries[?agentAliasName=='${ALIAS_NAME}'] | [0].agentAliasId" \
          --output text 2>/dev/null || true)

        if [ -n "$EXISTING_ALIAS_ID" ] && [ "$EXISTING_ALIAS_ID" != "None" ]; then
          echo "Deleting existing alias $EXISTING_ALIAS_ID..."
          aws bedrock-agent delete-agent-alias \
            --agent-id "$AGENT_ID" \
            --agent-alias-id "$EXISTING_ALIAS_ID" \
            --region "$AWS_REGION" > /dev/null
        fi

        echo "Creating alias (Bedrock will snapshot DRAFT as a new implicit version)..."
        aws bedrock-agent create-agent-alias \
          --agent-id "$AGENT_ID" \
          --agent-alias-name "$ALIAS_NAME" \
          --region "$AWS_REGION" \
          --output json > alias.json

        ALIAS_ID=$(jq -r '.agentAlias.agentAliasId' alias.json)
        echo "alias_id=$ALIAS_ID" >> $GITHUB_OUTPUT
        echo "Alias $ALIAS_NAME created: $ALIAS_ID"

    # -----------------------------
    # Update Lambda Environment
    # aws lambda update-function-configuration replaces the full env vars object,
    # so AGENT_ID, AGENT_ALIAS_ID, and GATEWAY_SECRET must all be included here.
    # -----------------------------
    - name: Update Lambda Environment Variables
      env:
        GATEWAY_SECRET: ${{ env.DEPLOY_ENV == 'dev' && secrets.DEV_GATEWAY_SECRET || secrets.GATEWAY_SECRET }}
      run: |
        aws lambda update-function-configuration \
          --function-name ${{ steps.tfout.outputs.function_name }} \
          --environment "Variables={AGENT_ID=${{ steps.tfout.outputs.agent_id }},AGENT_ALIAS_ID=${{ steps.create_or_update_alias.outputs.alias_id }},GATEWAY_SECRET=$GATEWAY_SECRET}"

    # -----------------------------
    # Write Outputs to SSM Parameter Store
    # SSM paths are namespaced per environment so frontend and knowledge
    # workflows can read the correct values for their target environment.
    # -----------------------------
    - name: Store Function URL Domain in SSM
      run: |
        aws ssm put-parameter \
          --name "${{ steps.env.outputs.ssm_prefix }}/function_url_domain" \
          --type "String" \
          --value "${{ steps.tfout.outputs.function_url_domain }}" \
          --overwrite

    - name: Store Knowledge Bucket in SSM
      run: |
        aws ssm put-parameter \
          --name "${{ steps.env.outputs.ssm_prefix }}/knowledge_bucket" \
          --type "String" \
          --value "${{ steps.tfout.outputs.bucket}}" \
          --overwrite

    # -----------------------------
    # DONE
    # -----------------------------
    - name: Deployment Complete
      run: echo "Mr. Beefy backend (${{ env.DEPLOY_ENV }}) deployed successfully."
