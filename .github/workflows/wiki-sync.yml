name: Sync Wiki to Knowledge

permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    - cron: "0 0 * * *"   # every day at midnight UTC
  workflow_dispatch:       # optional manual run button

jobs:
  sync-wiki:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout wiki repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Rebuild knowledge directory
        run: |
          rm -rf knowledge
          mkdir knowledge

          python3 << 'EOF'
          import os
          import re

          WIKI_DIR = "wiki"
          OUT_DIR = "knowledge"
          MAX_CHARS = 1500   # max chars per chunk (prefix included)
          OVERLAP_CHARS = 150  # chars of overlap carried into next chunk when splitting

          def heading_level(line):
              m = re.match(r'^(#{1,6})\s', line)
              return len(m.group(1)) if m else 0

          def strip_md_bold(text):
              return re.sub(r'\*+', '', text).strip()

          def build_sections(text, page_display):
              """
              Split markdown into (context_prefix, body) tuples.
              Each markdown heading starts a new section. The context prefix encodes
              the full heading hierarchy so every chunk knows its location in the doc.
              H1 is excluded from the section path (it duplicates the page name).
              """
              lines = text.split("\n")
              heading_hier = {}   # {level: heading_text}
              sections = []
              current_lines = []

              def flush():
                  body = "\n".join(current_lines).strip()
                  if not body:
                      return
                  path_parts = [heading_hier[l] for l in sorted(heading_hier.keys()) if l > 1]
                  if path_parts:
                      path = " > ".join(path_parts)
                      prefix = f"[Source: {page_display} | Section: {path}]\n\n"
                  else:
                      prefix = f"[Source: {page_display}]\n\n"
                  sections.append((prefix, body))

              for line in lines:
                  lvl = heading_level(line)
                  if lvl > 0:
                      flush()
                      current_lines = [line]
                      heading_text = strip_md_bold(re.match(r'^#{1,6}\s+(.*)', line).group(1))
                      heading_hier[lvl] = heading_text
                      for l in list(heading_hier.keys()):
                          if l > lvl:
                              del heading_hier[l]
                  else:
                      current_lines.append(line)

              flush()
              return sections

          def make_chunks(prefix, body, max_chars, overlap_chars):
              """
              Return one chunk if body fits, otherwise split by paragraph with overlap.
              Each chunk gets the context prefix prepended.
              """
              if len(prefix) + len(body) <= max_chars:
                  return [prefix + body]

              avail = max_chars - len(prefix)
              paragraphs = [p for p in re.split(r'\n\n+', body) if p.strip()]
              if not paragraphs:
                  return [prefix + body]

              chunks = []
              current = []
              current_len = 0

              for para in paragraphs:
                  if current and current_len + len(para) + 2 > avail:
                      chunks.append(prefix + "\n\n".join(current))
                      # Carry overlap into next chunk
                      overlap = []
                      overlap_len = 0
                      for p in reversed(current):
                          if overlap_len + len(p) + 2 <= overlap_chars:
                              overlap.insert(0, p)
                              overlap_len += len(p) + 2
                          else:
                              break
                      current = overlap
                      current_len = overlap_len
                  current.append(para)
                  current_len += len(para) + 2

              if current:
                  chunks.append(prefix + "\n\n".join(current))

              return chunks

          for filename in sorted(os.listdir(WIKI_DIR)):
              if not filename.endswith(".md"):
                  continue
              if filename == "_Sidebar.md":
                  continue

              page_name = filename.replace(".md", "").lower().replace(" ", "-")
              page_display = filename.replace(".md", "").replace("-", " ").title()
              page_path = os.path.join(WIKI_DIR, filename)

              with open(page_path, "r", encoding="utf-8") as f:
                  content = f.read()

              sections = build_sections(content, page_display)
              all_chunks = []
              for prefix, body in sections:
                  all_chunks.extend(make_chunks(prefix, body, MAX_CHARS, OVERLAP_CHARS))

              if not all_chunks:
                  continue

              page_dir = os.path.join(OUT_DIR, page_name)
              os.makedirs(page_dir, exist_ok=True)

              for i, chunk in enumerate(all_chunks, start=1):
                  out_path = os.path.join(page_dir, f"chunk-{i:03}.md")
                  with open(out_path, "w", encoding="utf-8") as out:
                      out.write(chunk)

          EOF

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Sync wiki → knowledge"
          title: "Automated: Sync wiki → knowledge"
          body: |
            This PR updates the `/knowledge` directory based on the latest wiki content.
            - Generated automatically
            - Do not edit `/knowledge` manually
          branch: automated/wiki-sync
          delete-branch: true