name: Deploy Mr. Beefy Frontend

on:
  push:
    branches: [ main ]
    paths:
      - "frontend/**"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you manually deploying?"
        required: false
        default: "Manual trigger"



jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    # -----------------------------
    # Read Function URL Domain from SSM
    # Written by the backend pipeline after every backend deploy.
    # -----------------------------
    - name: Read Function URL Domain from SSM
      id: api
      run: |
        FUNCTION_URL_DOMAIN=$(aws ssm get-parameter \
          --name "/mrbeefy/function_url_domain" \
          --query "Parameter.Value" \
          --output text)
        echo "function_url_domain=$FUNCTION_URL_DOMAIN" >> $GITHUB_OUTPUT
        echo "Using Function URL domain: $FUNCTION_URL_DOMAIN"

    # -----------------------------
    # Build Frontend (Vite)
    # -----------------------------
    - name: Install Node
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install UI Dependencies
      working-directory: frontend/UI
      run: npm install

    - name: Build UI
      working-directory: frontend/UI
      run: npm run build

    # -----------------------------
    # Terraform Init + Apply (Frontend Infra)
    # -----------------------------
    - name: Install Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      working-directory: frontend/IaC
      run: terraform init -upgrade

    - name: Terraform Apply
      working-directory: frontend/IaC
      run: |
        terraform apply -auto-approve \
          -var="function_url_domain=${{ steps.api.outputs.function_url_domain }}" \
          -var="gateway_secret=${{ secrets.GATEWAY_SECRET }}"

    # -----------------------------
    # Capture Terraform Outputs
    # -----------------------------
    - name: Capture Terraform Outputs
      id: tfout
      working-directory: frontend/IaC
      run: |
        echo "bucket=$(terraform output -raw frontend_bucket_name)" >> $GITHUB_OUTPUT
        echo "cf_domain=$(terraform output -raw cloudfront_domain_name)" >> $GITHUB_OUTPUT

    # -----------------------------
    # Upload Built UI to S3
    # -----------------------------
    - name: Sync UI to S3
      run: |
        aws s3 sync frontend/UI/dist/ s3://${{ steps.tfout.outputs.bucket }}/ --delete

    # -----------------------------
    # Invalidate CloudFront Cache
    # -----------------------------
    - name: Invalidate CloudFront
      run: |
        DISTRIBUTION_ID=$(aws cloudfront list-distributions \
          --query "DistributionList.Items[?DomainName=='${{ steps.tfout.outputs.cf_domain }}'].Id | [0]" \
          --output text)

        aws cloudfront create-invalidation \
          --distribution-id "$DISTRIBUTION_ID" \
          --paths "/*"

    # -----------------------------
    # Done
    # -----------------------------
    - name: Deployment Complete
      run: echo "Frontend deployed successfully."
