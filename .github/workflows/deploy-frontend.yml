# Deploy Mr. Beefy Frontend
# Environment-aware: main branch -> prod, dev branch -> dev.
# Manual dispatch allows choosing the target environment explicitly.
# Dev deploys to dev.mrbeefy.academy with signed cookies enforced.

name: Deploy Mr. Beefy Frontend

on:
  push:
    branches: [ main, dev ]
    paths:
      - "frontend/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "prod"
        type: choice
        options:
          - prod
          - dev
      reason:
        description: "Why are you manually deploying?"
        required: false
        default: "Manual trigger"

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    env:
      # Derive environment: manual input takes priority, then branch name, default to prod.
      DEPLOY_ENV: ${{ inputs.environment || (github.ref_name == 'dev' && 'dev') || 'prod' }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # -----------------------------
    # Resolve Environment
    # prod uses the "default" Terraform workspace (domain = mrbeefy.academy).
    # dev uses the "dev" workspace (domain = dev.mrbeefy.academy, signed cookies enabled).
    # -----------------------------
    - name: Resolve Environment
      id: env
      run: |
        if [ "$DEPLOY_ENV" = "dev" ]; then
          echo "tf_workspace=dev"         >> $GITHUB_OUTPUT
          echo "ssm_prefix=/mrbeefy-dev"  >> $GITHUB_OUTPUT
        else
          echo "tf_workspace=default"     >> $GITHUB_OUTPUT
          echo "ssm_prefix=/mrbeefy"      >> $GITHUB_OUTPUT
        fi
        echo "Deploying to: $DEPLOY_ENV"

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    # -----------------------------
    # Read Function URL Domain from SSM
    # Written by the backend pipeline after every backend deploy.
    # -----------------------------
    - name: Read Function URL Domain from SSM
      id: api
      run: |
        FUNCTION_URL_DOMAIN=$(aws ssm get-parameter \
          --name "${{ steps.env.outputs.ssm_prefix }}/function_url_domain" \
          --query "Parameter.Value" \
          --output text)
        echo "function_url_domain=$FUNCTION_URL_DOMAIN" >> $GITHUB_OUTPUT
        echo "Using Function URL domain: $FUNCTION_URL_DOMAIN"

    # -----------------------------
    # Build Frontend (Vite)
    # -----------------------------
    - name: Install Node
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install UI Dependencies
      working-directory: frontend/UI
      run: npm install

    - name: Build UI
      working-directory: frontend/UI
      run: npm run build

    # -----------------------------
    # Terraform Init + Apply (Frontend Infra)
    # -----------------------------
    - name: Install Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      working-directory: frontend/IaC
      run: terraform init -upgrade

    - name: Select Terraform Workspace
      working-directory: frontend/IaC
      run: |
        if [ "${{ steps.env.outputs.tf_workspace }}" != "default" ]; then
          terraform workspace select "${{ steps.env.outputs.tf_workspace }}" \
            || terraform workspace new "${{ steps.env.outputs.tf_workspace }}"
        else
          terraform workspace select default
        fi

    - name: Terraform Apply
      working-directory: frontend/IaC
      run: |
        # Dev requires cloudfront_public_key_pem for signed cookie key group.
        # Store the RSA public key PEM as DEV_CF_PUBLIC_KEY in GitHub secrets.
        if [ "$DEPLOY_ENV" = "dev" ]; then
          terraform apply -auto-approve \
            -var="function_url_domain=${{ steps.api.outputs.function_url_domain }}" \
            -var="gateway_secret=$GATEWAY_SECRET" \
            -var="cloudfront_public_key_pem=$CF_PUBLIC_KEY"
        else
          terraform apply -auto-approve \
            -var="function_url_domain=${{ steps.api.outputs.function_url_domain }}" \
            -var="gateway_secret=$GATEWAY_SECRET"
        fi
      env:
        GATEWAY_SECRET: ${{ env.DEPLOY_ENV == 'dev' && secrets.DEV_GATEWAY_SECRET || secrets.GATEWAY_SECRET }}
        CF_PUBLIC_KEY: ${{ secrets.DEV_CF_PUBLIC_KEY }}

    # -----------------------------
    # Capture Terraform Outputs
    # -----------------------------
    - name: Capture Terraform Outputs
      id: tfout
      working-directory: frontend/IaC
      run: |
        echo "bucket=$(terraform output -raw frontend_bucket_name)" >> $GITHUB_OUTPUT
        echo "cf_domain=$(terraform output -raw cloudfront_domain_name)" >> $GITHUB_OUTPUT

    # -----------------------------
    # Upload Built UI to S3
    # -----------------------------
    - name: Sync UI to S3
      run: |
        aws s3 sync frontend/UI/dist/ s3://${{ steps.tfout.outputs.bucket }}/ --delete

    # -----------------------------
    # Invalidate CloudFront Cache
    # -----------------------------
    - name: Invalidate CloudFront
      run: |
        DISTRIBUTION_ID=$(aws cloudfront list-distributions \
          --query "DistributionList.Items[?DomainName=='${{ steps.tfout.outputs.cf_domain }}'].Id | [0]" \
          --output text)

        aws cloudfront create-invalidation \
          --distribution-id "$DISTRIBUTION_ID" \
          --paths "/*"

    # -----------------------------
    # Done
    # -----------------------------
    - name: Deployment Complete
      run: echo "Mr. Beefy frontend (${{ env.DEPLOY_ENV }}) deployed successfully."
